<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 模型配置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: rgba(255,255,255,0.08);
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --kimi: #7c3aed;
      --deepseek: #2563eb;
      --qwen: #db2777;
      --zhipu: #ea580c;
      --ark: #dc2626;
      --openai: #10a37f;
      --anthropic: #d97706;
      --ollama: #9333ea;
      --custom: #6b7280;
      --danger: #f85149;
      --success: #3fb950;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .header-sub { font-size: 12px; color: var(--text2); margin-left: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }

    .main { max-width: 860px; margin: 0 auto; padding: 24px; }

    /* ── 标签页 ─────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: 10px; padding: 4px; }
    .tab { flex: 1; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); text-align: center; border: none; background: transparent; transition: all 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--surface2); color: var(--text); font-weight: 500; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── 工具栏 ─────────────────────────────────────── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .toolbar-left { font-size: 13px; color: var(--text2); }
    .current-model-badge { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 4px; }

    /* ── 按钮 ───────────────────────────────────────── */
    .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #79b8ff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.2); }
    .btn-success { background: rgba(63,185,80,0.15); color: var(--success); border: 1px solid rgba(63,185,80,0.3); }
    .btn-success:hover { background: rgba(63,185,80,0.25); }
    .btn-danger { background: rgba(248,81,73,0.15); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
    .btn-danger:hover { background: rgba(248,81,73,0.25); }
    .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* ── 供应商标签 ─────────────────────────────────── */
    .provider-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .provider-kimi { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .provider-deepseek { background: rgba(37,99,235,0.2); color: #60a5fa; }
    .provider-qwen { background: rgba(219,39,119,0.2); color: #f472b6; }
    .provider-zhipu { background: rgba(234,88,12,0.2); color: #fb923c; }
    .provider-ark { background: rgba(220,38,38,0.2); color: #f87171; }
    .provider-openai { background: rgba(16,163,127,0.2); color: #34d399; }
    .provider-anthropic { background: rgba(217,119,6,0.2); color: #fbbf24; }
    .provider-ollama { background: rgba(147,51,234,0.2); color: #c084fc; }
    .provider-gemini, .provider-grok, .provider-custom { background: rgba(107,114,128,0.2); color: #9ca3af; }

    /* ── 配置组卡片 ─────────────────────────────────── */
    .config-list { display: flex; flex-direction: column; gap: 16px; }

    .config-group { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color 0.2s; }
    .config-group.active { border-color: var(--success); }
    .config-group.active > .config-head { border-bottom-color: rgba(63,185,80,0.15); }

    .config-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .config-head-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .config-name { font-size: 15px; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; }
    .config-name-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .active-badge { background: rgba(63,185,80,0.2); color: var(--success); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .config-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

    .config-body { padding: 12px 18px; }

    /* ── 模型列表 ───────────────────────────────────── */
    .models-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 32px; }
    .model-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .model-chip:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
    .model-chip.current { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }
    .model-chip.active { border-color: var(--success); color: var(--success); background: rgba(63,185,80,0.1); }
    .model-chip .remove-model {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(248,81,73,0.2);
      color: var(--danger);
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      margin-left: 2px;
      border: none;
      padding: 0;
    }
    .model-chip:hover .remove-model { opacity: 1; }
    .model-chip .remove-model:hover { background: var(--danger); color: #fff; }

    /* ── 添加模型行 ─────────────────────────────────── */
    .add-model-row { display: flex; gap: 6px; align-items: center; margin-top: 8px; }
    .add-model-row input {
      flex: 1;
      padding: 6px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      outline: none;
    }
    .add-model-row input:focus { border-color: var(--accent); }
    .add-model-row input::placeholder { color: var(--text2); }

    /* ── 空状态 ─────────────────────────────────────── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .empty-state p + p { margin-top: 6px; font-size: 12px; color: #555; }

    /* ── Toast ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.success { border-color: var(--success); color: var(--success); }

    /* ── 模态框 ─────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; }

    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .form-label span { color: var(--text); font-weight: 600; }
    .form-hint { font-size: 11px; color: #555; margin-top: 4px; }

    .form-input, .form-select {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-select { cursor: pointer; }

    textarea.form-input { resize: vertical; min-height: 70px; font-family: inherit; line-height: 1.5; }

    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

    /* ── JSON 视图 ───────────────────────────────────── */
    #json-tab pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      color: var(--text2);
      white-space: pre;
    }

    /* ── 删除确认框 ──────────────────────────────────── */
    .confirm-text { font-size: 14px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
    .confirm-text strong { color: var(--text); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <span class="status-dot"></span>
    Claude Code 模型配置
    <span class="header-sub" id="current-model"></span>
  </div>
  <button class="btn btn-primary" onclick="openNewGroupModal()">+ 新建配置组</button>
</div>

<div class="main">
  <!-- 标签页 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('list', this)">配置列表</button>
    <button class="tab" onclick="switchTab('json', this)">JSON / YAML</button>
  </div>

  <!-- 配置列表 -->
  <div id="list-tab" class="tab-content active">
    <div class="toolbar">
      <div class="toolbar-left">
        共 <strong id="group-count">0</strong> 个配置组
        <span class="current-model-badge" id="active-model-badge" style="display:none">未激活</span>
      </div>
    </div>
    <div class="config-list" id="config-list"></div>
  </div>

  <!-- JSON 视图 -->
  <div id="json-tab" class="tab-content">
    <pre id="json-output">加载中...</pre>
  </div>
</div>

<!-- 新建/编辑模态框 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">新建配置组</div>

    <div class="form-row" id="edit-group-id-row" style="display:none">
      <label class="form-label">组 ID</label>
      <input class="form-input" id="edit-group-id" readonly style="opacity:0.5;font-size:12px">
    </div>

    <div class="form-row">
      <label class="form-label">配置组名称 <span>*</span></label>
      <input class="form-input" id="group-name" placeholder="例如：Kimi 生产环境">
      <div class="form-hint">给这个配置组起个容易识别的名字</div>
    </div>

    <div class="form-row">
      <label class="form-label">选择提供商 <span>*</span></label>
      <select class="form-select" id="group-provider" onchange="onProviderChange()">
        <option value="">-- 选择 --</option>
        <option value="kimi">Kimi（月之暗面）</option>
        <option value="deepseek">DeepSeek</option>
        <option value="qwen">通义千问（阿里云）</option>
        <option value="zhipu">智谱 GLM</option>
        <option value="ark">火山引擎 ARK</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="ollama">Ollama（本地）</option>
        <option value="custom">自定义 API</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">API Key <span>*</span></label>
      <input class="form-input" id="group-apikey" placeholder="sk-xxxxxxxxxxxxxxxx" type="password">
    </div>

    <div class="form-row" id="baseurl-row">
      <label class="form-label">接口地址</label>
      <input class="form-input" id="group-baseurl" placeholder="选完提供商后自动填充，可修改">
      <div class="form-hint" id="baseurl-hint">选完提供商后自动填写，通常不需要改</div>
    </div>

    <div class="form-row">
      <label class="form-label">模型名称 <span>*</span></label>
      <input class="form-input" id="group-models" placeholder="例如：kimi-k2.6, moonshot-v1-8k">
      <div class="form-hint">多个模型用逗号分隔，例如：deepseek-chat, deepseek-reasoner</div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveGroup()">保存</button>
    </div>
  </div>
</div>

<!-- 删除确认框 -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-title">确认删除</div>
    <div class="confirm-text" id="delete-confirm-text"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" id="confirm-delete-btn" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ── 状态 ──────────────────────────────────────────────────
let groups = [];
let activeGroupId = null;
let activeModel = null;
let editingGroupId = null;
let deleteTarget = null;

// ── 工具函数 ──────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ── 加载数据 ──────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('/api/configs');
    const d = await r.json();
    groups = d.configs || [];
    activeGroupId = d.activeGroupId;
    activeModel = d.activeModel;
    renderGroups();
    updateStatusBar();
    updateJsonView();
  } catch (e) {
    showToast('加载配置失败: ' + e.message, 'error');
  }
}

function updateStatusBar() {
  document.getElementById('group-count').textContent = groups.length;
  const badge = document.getElementById('active-model-badge');
  if (activeGroupId && activeModel) {
    const g = groups.find(x => x.id === activeGroupId);
    if (g) {
      badge.textContent = g.name + ' / ' + activeModel;
      badge.style.display = 'inline-block';
      document.getElementById('current-model').textContent = g.name + ' › ' + activeModel;
    }
  } else {
    badge.textContent = '未激活';
    badge.style.display = 'inline-block';
    document.getElementById('current-model').textContent = '未选择模型';
  }
}

// ── 渲染 ──────────────────────────────────────────────────
function renderGroups() {
  const c = document.getElementById('config-list');
  if (groups.length === 0) {
    c.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📝</div>
        <p>还没有配置组</p>
        <p>点击右上角「新建配置组」添加你的第一个配置</p>
      </div>`;
    return;
  }
  c.innerHTML = groups.map(g => {
    const isActive = g.id === activeGroupId;
    return `
      <div class="config-group${isActive ? ' active' : ''}">
        <div class="config-head">
          <div class="config-head-left">
            <div>
              <div class="config-name">${escapeHtml(g.name)}</div>
              <div class="config-name-desc">
                <span class="provider-tag provider-${g.provider}">${PROVIDER_NAMES[g.provider] || g.provider}</span>
                ${isActive ? '<span class="active-badge">✓ 当前激活</span>' : ''}
              </div>
            </div>
          </div>
          <div class="config-actions">
            ${!isActive ? `<button class="btn btn-success btn-xs" onclick="activateGroup('${g.id}')">激活</button>` : ''}
            <button class="btn btn-secondary btn-xs" onclick="openEditModal('${g.id}')">编辑</button>
            <button class="btn btn-danger btn-xs" onclick="openDeleteModal('${g.id}')">删除</button>
          </div>
        </div>
        <div class="config-body">
          <div class="models-grid">
            ${g.models.map(m => `
              <div class="model-chip${m === g.activeModel ? ' current' : ''}${isActive && m === activeModel ? ' active' : ''}"
                   onclick="activateModel('${g.id}', '${escapeHtml(m)}')">
                ${escapeHtml(m)}
                ${isActive && m === activeModel ? ' ✓' : ''}
                <button class="remove-model" onclick="event.stopPropagation(); removeModel('${g.id}', '${escapeHtml(m)}')" title="移除此模型">×</button>
              </div>
            `).join('')}
          </div>
          <div class="add-model-row">
            <input id="add-model-${g.id}" placeholder="输入模型名称，回车添加"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();addModel('${g.id}')}">
            <button class="btn btn-secondary btn-xs" onclick="addModel('${g.id}')">+ 添加</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── 新建 / 编辑 ───────────────────────────────────────────
function openNewGroupModal() {
  editingGroupId = null;
  document.getElementById('modal-title').textContent = '新建配置组';
  document.getElementById('modal-save-btn').textContent = '创建';
  document.getElementById('edit-group-id-row').style.display = 'none';
  document.getElementById('group-name').value = '';
  document.getElementById('group-provider').value = '';
  document.getElementById('group-apikey').value = '';
  document.getElementById('group-baseurl').value = '';
  document.getElementById('group-models').value = '';
  document.getElementById('baseurl-hint').textContent = '选完提供商后自动填写，通常不需要改';
  document.getElementById('modal').classList.add('show');
  document.getElementById('group-name').focus();
}

function openEditModal(id) {
  const g = groups.find(x => x.id === id);
  if (!g) return;
  editingGroupId = id;
  document.getElementById('modal-title').textContent = '编辑配置组';
  document.getElementById('modal-save-btn').textContent = '保存修改';
  document.getElementById('edit-group-id-row').style.display = 'block';
  document.getElementById('edit-group-id').value = g.id;
  document.getElementById('group-name').value = g.name;
  document.getElementById('group-provider').value = g.provider;
  document.getElementById('group-apikey').value = g.apiKey;
  document.getElementById('group-baseurl').value = g.baseUrl;
  document.getElementById('group-models').value = g.models.join(', ');
  document.getElementById('baseurl-hint').textContent = g.baseUrl;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingGroupId = null;
}

function onProviderChange() {
  const p = document.getElementById('group-provider').value;
  const hints = {
    kimi: 'https://api.moonshot.cn/v1',
    deepseek: 'https://api.deepseek.com/v1',
    qwen: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
    zhipu: 'https://open.bigmodel.cn/api/paas/v4',
    ark: 'https://ark.cn-beijing.volces.com/api/v3',
    openai: 'https://api.openai.com/v1',
    anthropic: 'https://api.anthropic.com/v1',
    ollama: 'http://localhost:11434',
    custom: ''
  };
  if (hints[p]) {
    document.getElementById('group-baseurl').value = hints[p];
    document.getElementById('baseurl-hint').textContent = hints[p];
  } else {
    document.getElementById('group-baseurl').value = '';
    document.getElementById('baseurl-hint').textContent = '选完提供商后自动填写，通常不需要改';
  }
}

async function saveGroup() {
  const name = document.getElementById('group-name').value.trim();
  const provider = document.getElementById('group-provider').value;
  const apiKey = document.getElementById('group-apikey').value.trim();
  const baseUrl = document.getElementById('group-baseurl').value.trim();
  const models = document.getElementById('group-models').value.trim();

  if (!name) { showToast('请填写配置组名称', 'error'); return; }
  if (!provider) { showToast('请选择提供商', 'error'); return; }
  if (!apiKey) { showToast('请填写 API Key', 'error'); return; }
  if (!models) { showToast('请至少填写一个模型名称', 'error'); return; }

  const payload = { name, provider, apiKey, baseUrl, models };

  let url = '/api/configs';
  let method = 'POST';
  let successMsg = '配置组创建成功';

  if (editingGroupId) {
    url = '/api/configs/' + editingGroupId;
    method = 'PUT';
    successMsg = '配置组已更新';
  }

  try {
    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || '操作失败', 'error'); return; }
    showToast(successMsg);
    closeModal();
    await loadData();
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
  }
}

// ── 激活 ──────────────────────────────────────────────────
async function activateGroup(id) {
  try {
    const r = await fetch('/api/configs/' + id + '/activate', { method: 'POST' });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || '激活失败', 'error'); return; }
    activeGroupId = d.activeGroupId;
    activeModel = d.activeModel;
    renderGroups();
    updateStatusBar();
    showToast('已激活 ' + (groups.find(x=>x.id===id)?.name || ''));
  } catch (e) { showToast('激活失败: ' + e.message, 'error'); }
}

async function activateModel(groupId, model) {
  try {
    const r = await fetch('/api/configs/' + groupId + '/models/' + encodeURIComponent(model) + '/activate', { method: 'POST' });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || '切换失败', 'error'); return; }
    activeGroupId = d.activeGroupId;
    activeModel = d.activeModel;
    renderGroups();
    updateStatusBar();
  } catch (e) { showToast('切换失败: ' + e.message, 'error'); }
}

// ── 添加 / 删除模型 ───────────────────────────────────────
async function addModel(groupId) {
  const input = document.getElementById('add-model-' + groupId);
  const name = input.value.trim();
  if (!name) return;
  try {
    const r = await fetch('/api/configs/' + groupId + '/models', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ models: name })
    });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || '添加失败', 'error'); return; }
    input.value = '';
    await loadData();
    showToast('已添加: ' + name);
  } catch (e) { showToast('添加失败: ' + e.message, 'error'); }
}

async function removeModel(groupId, model) {
  try {
    const r = await fetch('/api/configs/' + groupId + '/models/' + encodeURIComponent(model), { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || '删除失败', 'error'); return; }
    await loadData();
    showToast('已移除: ' + model);
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

// ── 删除 ──────────────────────────────────────────────────
function openDeleteModal(id) {
  const g = groups.find(x => x.id === id);
  if (!g) return;
  deleteTarget = id;
  document.getElementById('delete-confirm-text').innerHTML =
    `确定要删除配置组 <strong>${escapeHtml(g.name)}</strong> 吗？<br>包含 ${g.models.length} 个模型：${g.models.map(m=>escapeHtml(m)).join('、')}`;
  document.getElementById('delete-modal').classList.add('show');
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('show');
  deleteTarget = null;
}

async function confirmDelete() {
  if (!deleteTarget) return;
  try {
    const r = await fetch('/api/configs/' + deleteTarget, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || '删除失败', 'error'); return; }
    showToast('已删除');
    closeDeleteModal();
    await loadData();
  } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
}

// ── 标签页 ────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tab + '-tab').classList.add('active');
  if (btn) btn.classList.add('active');
  if (tab === 'json') updateJsonView();
}

async function updateJsonView() {
  try {
    const r = await fetch('/api/configs');
    const d = await r.json();
    document.getElementById('json-output').textContent = JSON.stringify(d, null, 2);
  } catch { document.getElementById('json-output').textContent = '加载失败'; }
}
